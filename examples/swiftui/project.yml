name: SkyleSwiftUIExample

options:
  bundleIdPrefix: de.eyev.skyle.example
  deploymentTarget:
    macOS: "12.0"
    iOS: "15.0"
  createIntermediateGroups: true

# Shared settings for both targets.
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_OBJC_BRIDGING_HEADER: Support/Skylelib-Bridging-Header.h
    # Resolve <skylelib/...> from the headers bundled inside skylelib.xcframework
    # (each slice carries Headers/skylelib/...). Recursive so the per-platform
    # slice is picked up regardless of the build destination. No source tree
    # required — works against a downloaded release.
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)/../../dist/skylelib.xcframework/**
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:

  SkyleSwiftUI-macOS:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.eyev.skyle.example.mac
        PRODUCT_NAME: Skyle
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
    dependencies:
      - framework: ../../dist/skylelib.xcframework
        embed: false
      - sdk: IOKit.framework
      - sdk: CoreFoundation.framework

  SkyleSwiftUI-iOS:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Support/iOS-Info.plist
      properties:
        CFBundleDisplayName: Skyle
        UILaunchScreen: {}
        # MFi accessory protocol — required to talk to the Skyle over
        # ExternalAccessory on iPadOS.
        UISupportedExternalAccessoryProtocols:
          - de.eyev.eap
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.eyev.skyle.example.ios
        PRODUCT_NAME: Skyle
        TARGETED_DEVICE_FAMILY: "2"   # iPad
        # Simulator/CI builds: don't require a signing identity.
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - framework: ../../dist/skylelib.xcframework
        embed: false
      - sdk: ExternalAccessory.framework
